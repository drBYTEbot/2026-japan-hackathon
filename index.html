<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ArcAIdia — an ai& office arcade</title>
<meta name="description" content="ArcAIdia — an immersive office-themed arcade by ai& with three mini-games and a claw-machine sticker shop." />

    <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#g)"/>

  </svg>
  <div id="bootmsg">Loading ArcAIdia…</div>

<canvas id="game" width="960" height="540"></canvas>
